<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FeudBox — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #f5c518; --gold-dark: #c49b10;
    --bg: #0e0800; --surface: #1e1200; --surface2: #2a1a00;
    --red: #c0392b; --green: #27ae60; --blue: #1a6faf;
    --text: #f0e6cc; --muted: #8a7a5a; --border: #3a2800;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Source Sans 3', sans-serif; min-height: 100vh; }
  header { background: var(--surface); border-bottom: 2px solid var(--gold); padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Oswald', sans-serif; font-size: 24px; color: var(--gold); letter-spacing: 3px; }
  .user-info { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--muted); }
  .btn-logout { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px;
    border-radius: 6px; cursor: pointer; font-size: 12px; }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }
  main { max-width: 900px; margin: 0 auto; padding: 32px 20px; }
  h2 { font-family: 'Oswald', sans-serif; font-size: 20px; color: var(--gold); letter-spacing: 2px;
    margin-bottom: 20px; text-transform: uppercase; }
  .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .event-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px;
    cursor: pointer; transition: all 0.2s; }
  .event-card:hover { border-color: var(--gold); box-shadow: 0 0 12px #f5c51822; }
  .event-name { font-family: 'Oswald', sans-serif; font-size: 18px; color: var(--gold); margin-bottom: 6px; }
  .event-teams { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .event-slug { font-size: 11px; color: var(--border); font-family: monospace; margin-bottom: 14px; }
  .card-actions { display: flex; gap: 8px; }
  .btn { padding: 7px 12px; font-size: 12px; border-radius: 6px; cursor: pointer; border: none;
    font-family: 'Source Sans 3', sans-serif; font-weight: 600; transition: all 0.15s; }
  .btn:active { transform: scale(0.95); }
  .btn-gold { background: var(--gold); color: #1a0800; }
  .btn-gold:hover { background: var(--gold-dark); }
  .btn-blue { background: var(--blue); color: #fff; }
  .btn-blue:hover { background: #155a8a; }
  .btn-red { background: transparent; border: 1px solid var(--red); color: var(--red); }
  .btn-red:hover { background: var(--red); color: #fff; }
  .new-card { background: var(--surface2); border: 2px dashed var(--border); border-radius: 12px;
    padding: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: all 0.2s; min-height: 140px; }
  .new-card:hover { border-color: var(--gold); }
  .new-card-inner { text-align: center; color: var(--muted); }
  .new-card-icon { font-size: 32px; margin-bottom: 8px; }
  .new-card-text { font-family: 'Oswald', sans-serif; font-size: 14px; letter-spacing: 1px; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex;
    align-items: center; justify-content: center; z-index: 100; display: none; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 28px; width: 100%; max-width: 480px; }
  .modal h3 { font-family: 'Oswald', sans-serif; color: var(--gold); font-size: 18px;
    letter-spacing: 2px; margin-bottom: 20px; }
  .field { margin-bottom: 14px; }
  label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px;
    letter-spacing: 1px; text-transform: uppercase; }
  input[type=text], input[type=email] { width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 9px 11px; font-size: 13px; outline: none;
    font-family: 'Source Sans 3', sans-serif; }
  input:focus { border-color: var(--gold); }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .msg { padding: 8px 12px; border-radius: 6px; font-size: 12px; margin-top: 10px; }
  .msg.error { background: #3a0a0a; color: #ff6b6b; }
  .msg.success { background: #0a3a1a; color: #4ddb7a; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo">FEUDBOX</div>
  <div class="user-info">
    <span id="user-name">Loading...</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</header>

<main>
  <h2>My Events</h2>
  <div class="events-grid" id="events-grid">
    <div class="empty-state">Loading events...</div>
  </div>

  <div id="modal-bg" class="modal-bg">
    <div class="modal">
      <h3 id="modal-title">NEW EVENT</h3>
      <div class="field">
        <label>Event Name</label>
        <input type="text" id="ev-name" placeholder="e.g. AMR Student Feud 2025"/>
      </div>
      <div class="field">
        <label>Team 1 Name</label>
        <input type="text" id="ev-t1" placeholder="e.g. PATHOSHIELD"/>
      </div>
      <div class="field">
        <label>Team 2 Name</label>
        <input type="text" id="ev-t2" placeholder="e.g. AMR AVENGERS"/>
      </div>
      <div id="modal-msg" style="display:none" class="msg error"></div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()" style="background:var(--surface2);color:var(--muted);">Cancel</button>
        <button class="btn btn-gold" onclick="saveEvent()">CREATE EVENT</button>
      </div>
    </div>
  </div>
</main>

<script type="module">
import { supabase } from './js/supabase-client.js'

let currentUser = null
let editingEventId = null

async function init() {
  const { data: { session } } = await supabase.auth.getSession()
  if (!session) { window.location.href = 'login.html'; return }
  currentUser = session.user
  document.getElementById('user-name').textContent = currentUser.user_metadata?.name || currentUser.email
  loadEvents()
}

async function loadEvents() {
  const { data: events, error } = await supabase
    .from('events')
    .select('*')
    .order('created_at', { ascending: false })

  const grid = document.getElementById('events-grid')
  grid.innerHTML = ''

  const newCard = document.createElement('div')
  newCard.className = 'new-card'
  newCard.onclick = () => openModal()
  newCard.innerHTML = `<div class="new-card-inner"><div class="new-card-icon">＋</div><div class="new-card-text">NEW EVENT</div></div>`
  grid.appendChild(newCard)

  if (!events || events.length === 0) return

  events.forEach(ev => {
    const card = document.createElement('div')
    card.className = 'event-card'
    card.innerHTML = `
      <div class="event-name">${ev.name}</div>
      <div class="event-teams">${ev.team1_name} vs ${ev.team2_name}</div>
      <div class="event-slug">feudbox.app/board/${ev.slug}</div>
      <div class="card-actions">
        <a class="btn btn-gold" href="control.html?slug=${ev.slug}" target="_blank">Control</a>
        <a class="btn btn-blue" href="board.html?slug=${ev.slug}" target="_blank">Board</a>
        <button class="btn btn-red" onclick="deleteEvent('${ev.id}', event)">Delete</button>
      </div>`
    grid.insertBefore(card, newCard)
  })
}

function openModal(ev = null) {
  editingEventId = ev?.id || null
  document.getElementById('modal-title').textContent = ev ? 'EDIT EVENT' : 'NEW EVENT'
  document.getElementById('ev-name').value = ev?.name || ''
  document.getElementById('ev-t1').value = ev?.team1_name || ''
  document.getElementById('ev-t2').value = ev?.team2_name || ''
  document.getElementById('modal-msg').style.display = 'none'
  document.getElementById('modal-bg').classList.add('open')
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open')
}

function slugify(text) {
  return text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') +
    '-' + Math.random().toString(36).slice(2, 6)
}

function showModalMsg(text) {
  const el = document.getElementById('modal-msg')
  el.textContent = text
  el.style.display = 'block'
}

async function saveEvent() {
  const name = document.getElementById('ev-name').value.trim()
  const t1 = document.getElementById('ev-t1').value.trim()
  const t2 = document.getElementById('ev-t2').value.trim()
  if (!name || !t1 || !t2) { showModalMsg('Fill in all fields.'); return }

  if (editingEventId) {
    const { error } = await supabase.from('events')
      .update({ name, team1_name: t1, team2_name: t2 })
      .eq('id', editingEventId)
    if (error) { showModalMsg(error.message); return }
  } else {
    const slug = slugify(name)
    const { data: ev, error } = await supabase.from('events')
      .insert({ name, team1_name: t1, team2_name: t2, slug, owner_id: currentUser.id })
      .select().single()
    if (error) { showModalMsg(error.message); return }

    // Create initial game session
    await supabase.from('game_sessions').insert({
      event_id: ev.id,
      state: {
        question: '', answers: [], revealed: [], strikes: 0,
        roundPts: 0, multiplier: 1,
        team1: { name: t1, score: 0 },
        team2: { name: t2, score: 0 },
        msg: { text: 'Waiting for round to start...', type: 'info' },
        flash: null
      }
    })
  }

  closeModal()
  loadEvents()
}

async function deleteEvent(id, e) {
  e.stopPropagation()
  if (!confirm('Delete this event? This cannot be undone.')) return
  await supabase.from('events').delete().eq('id', id)
  loadEvents()
}

function openControl(slug) {
  window.open(`control.html?slug=${slug}`, '_blank')
}

function openBoard(slug) {
  window.open(`board.html?slug=${slug}`, '_blank')
}

async function logout() {
  await supabase.auth.signOut()
  window.location.href = 'login.html'
}

window.openModal = openModal
window.closeModal = closeModal
window.saveEvent = saveEvent
window.deleteEvent = deleteEvent
window.openControl = openControl
window.openBoard = openBoard
window.logout = logout

init()
</script>
</body>
</html>
